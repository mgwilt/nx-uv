pre-commit:
  commands:
    format-check:
      run: pnpm format:check
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    test-unit:
      run: pnpm test:unit
    test-integration:
      run: pnpm test:integration

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  commands:
    quality-ci:
      run: pnpm quality:ci
