name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        type: choice
        options:
          - beta
          - stable
        default: stable
      version:
        description: Optional exact version (for example 0.2.0)
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    env:
      NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: |
          pnpm quality:ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Enforce first stable v1 release input
        if: ${{ inputs.channel == 'stable' }}
        run: |
          set -euo pipefail

          if git tag --list 'v1.*' | grep -q .; then
            echo "Existing v1 tag detected; first-v1 guard is not required."
            exit 0
          fi

          if [ "${{ inputs.version }}" != "1.0.0" ]; then
            echo "First stable release must be run with version=1.0.0."
            echo "Current release resolver is tag-based and would otherwise derive a pre-v1 bump."
            echo "Re-run this workflow with channel=stable and version=1.0.0."
            exit 1
          fi

          echo "First stable v1 release guard satisfied."

      - name: Version release from conventional commits
        run: |
          set -euo pipefail
          git fetch --tags --force

          if [ -n "${{ inputs.version }}" ]; then
            TAG="v${{ inputs.version }}"
            if git rev-parse -q --verify "refs/tags/$TAG" > /dev/null; then
              CURRENT_VERSION="$(node -p "require('./package.json').version")"
              if [ "$CURRENT_VERSION" != "${{ inputs.version }}" ]; then
                echo "Requested version tag $TAG already exists, but package.json is $CURRENT_VERSION."
                echo "Refusing to publish mismatched sources for an existing exact tag."
                exit 1
              fi

              echo "Requested version tag $TAG already exists; skipping versioning."
              exit 0
            fi

            pnpm nx release version "${{ inputs.version }}" --git-commit --git-tag --git-push
          elif [ "${{ inputs.channel }}" = "beta" ]; then
            pnpm nx release version --preid beta --git-commit --git-tag --git-push
          else
            pnpm nx release version --git-commit --git-tag --git-push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ inputs.channel }}" = "beta" ]; then
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Sanitize dist package lifecycle scripts for publish
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = "dist/package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf-8"));

          if (pkg.scripts && typeof pkg.scripts === "object") {
            delete pkg.scripts.prepare;
            delete pkg.scripts["hooks:install"];
          }

          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`, "utf-8");
          NODE

      - name: Publish release to npm (Trusted Publishing)
        id: publish_npm_trusted
        continue-on-error: true
        run: pnpm nx release publish --tag ${{ steps.release_tag.outputs.npm_tag }} --access public
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release to npm (Token Fallback)
        id: publish_npm_token
        if: ${{ env.NPM_ACCESS_TOKEN != '' && steps.publish_npm_trusted.outcome != 'success' }}
        continue-on-error: true
        run: pnpm nx release publish --tag ${{ steps.release_tag.outputs.npm_tag }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure npm for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
          scope: "@mgwilt"

      - name: Publish release to GitHub Packages
        run: pnpm nx release publish --registry=https://npm.pkg.github.com --tag ${{ steps.release_tag.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(git tag --points-at HEAD | sort -V | tail -n1)"
          if [ -z "$TAG" ]; then
            TAG="$(git tag --sort=-v:refname | head -n1)"
          fi
          if [ -z "$TAG" ]; then
            echo "No release tag found in repository."
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "GitHub release already exists for $TAG"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes
          fi

      - name: Verify npm publish succeeded
        if: ${{ steps.publish_npm_trusted.outcome != 'success' && steps.publish_npm_token.outcome != 'success' }}
        run: |
          echo "npm publish failed with both methods."
          echo "Trusted Publishing outcome: ${{ steps.publish_npm_trusted.outcome }}"
          echo "Token Fallback outcome: ${{ steps.publish_npm_token.outcome }}"
          echo "Rotate NPM_ACCESS_TOKEN or configure npm Trusted Publishing for this repo and rerun."
          exit 1
