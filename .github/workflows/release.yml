name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        type: choice
        options:
          - beta
          - stable
        default: stable
      version:
        description: Optional exact version (for example 0.2.0)
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    env:
      NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: |
          pnpm quality:ci

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version release from conventional commits
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            pnpm nx release version "${{ inputs.version }}" --git-commit --git-tag --git-push
          elif [ "${{ inputs.channel }}" = "beta" ]; then
            pnpm nx release version --preid beta --git-commit --git-tag --git-push
          else
            pnpm nx release version --git-commit --git-tag --git-push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ inputs.channel }}" = "beta" ]; then
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish prerelease to npm (Trusted Publishing)
        if: ${{ env.NPM_ACCESS_TOKEN == '' }}
        run: pnpm nx release publish --tag ${{ steps.release_tag.outputs.npm_tag }}
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish prerelease to npm (Token Fallback)
        if: ${{ env.NPM_ACCESS_TOKEN != '' }}
        run: pnpm nx release publish --tag ${{ steps.release_tag.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure npm for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
          scope: "@mgwilt"

      - name: Publish prerelease to GitHub Packages
        run: pnpm nx release publish --registry=https://npm.pkg.github.com --tag ${{ steps.release_tag.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$(git tag --points-at HEAD | sort -V | tail -n1)"
          if [ -z "$TAG" ]; then
            TAG="$(git tag --sort=-v:refname | head -n1)"
          fi
          if [ -z "$TAG" ]; then
            echo "No release tag found in repository."
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "GitHub release already exists for $TAG"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes
          fi
