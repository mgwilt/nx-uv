stages:
  - quality

quality:nx:
  image: node:20-bookworm-slim
  stage: quality
  variables:
    NX_DAEMON: 'false'
  before_script:
    - corepack enable
    - corepack prepare pnpm@10 --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm nx run-many -t test,lint,build --all --outputStyle=static
